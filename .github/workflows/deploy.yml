name: Generate courses

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * *'

concurrency: generate-courses

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          path: main
      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm
      - name: Generate courses
        env:
          PROXY_SERVER_URL: ${{ secrets.PROXY_SERVER_URL }}
        run: |
          PROXY_ARG=""
          if [ -n "$PROXY_SERVER_URL" ]; then
            PROXY_SERVER=$(curl -sf "$PROXY_SERVER_URL")
            echo "::add-mask::$PROXY_SERVER"
            PROXY_ARG="--proxy-server=$PROXY_SERVER"
          fi
          python -u ./main/courses_to_json.py last-3 \
            './gh-pages/courses_{year}_{semester}.json' \
            --min-js-output-file='./gh-pages/courses_{year}_{semester}.min.js' \
            --last-semesters-output-file './gh-pages/last_semesters.json' \
            --run-postprocessing \
            $PROXY_ARG
      - name: Deploy
        run: |
          cd gh-pages
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff-index --quiet --cached HEAD || git commit -m "Update courses"
          git push
